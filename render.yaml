services:
  - type: web
    name: spendly-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: spendly-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    buildCommand: ""
